<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>Done — Shared Lists</title>
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --bg:#0f172a;--card:#0f172a;--surface:#1e293b;--border:#334155;
    --txt:#e2e8f0;--muted:#94a3b8;--accent:#22c55e;--bad:#ef4444;--row:#141c2e;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,sans-serif}
  .app{max-width:640px;margin:0 auto;padding:16px}
  header{display:flex;align-items:center;justify-content:space-between;gap:10px}
  h1{margin:0;font-size:clamp(20px,4vw,26px);letter-spacing:.3px}
  .small{font-size:12px;color:var(--muted)}
  .btn{border:1px solid var(--border);background:var(--surface);color:var(--txt);padding:6px 10px;border-radius:10px;cursor:pointer;font-size:13px}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#16a34a);border:none;color:#fff;font-weight:600}
  .btn-danger{background:linear-gradient(135deg,var(--bad),#dc2626);border:none;color:#fff}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  .card{background:var(--row);border:1px solid var(--border);border-radius:14px;padding:14px;margin:12px 0}
  .input{display:flex;gap:8px;flex-wrap:wrap}
  @media(min-width:420px){.input{flex-wrap:nowrap}}
  input[type="text"],input[type="email"],input[type="password"],select{background:var(--surface);border:1px solid var(--border);color:var(--txt);padding:10px 12px;border-radius:10px;font-size:15px;flex:1 1 160px;min-width:0}
  #btn-add{flex-shrink:0;white-space:nowrap}
  .row{display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid rgba(255,255,255,.04);border-left:3px solid transparent}
  .row:last-child{border-bottom:none}
  .row.mine{border-left-color:var(--accent)}
  .row.partner{border-left-color:#60a5fa}
  .section-hdr{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 0 4px 0;border-bottom:1px solid rgba(255,255,255,.06);margin-top:4px}
  .section-hdr:first-child{margin-top:0}
  .check{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;background:transparent;flex-shrink:0}
  .check.on{background:var(--accent);border-color:var(--accent)}
  .name{flex:1;word-break:break-word}
  .name.done{text-decoration:line-through;color:var(--muted)}
  .meta{font-size:12px;color:var(--muted);min-width:70px;text-align:right;white-space:nowrap}
  .tag{background:var(--surface);border:1px solid var(--border);padding:3px 8px;border-radius:999px;font-size:12px;color:var(--muted);margin-left:6px;white-space:nowrap}
  .chip-group{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 6px}
  .chip{border:1px solid var(--border);background:var(--surface);color:var(--txt);padding:6px 10px;border-radius:999px;font-size:13px;cursor:pointer}
  .chip.active{background:linear-gradient(135deg,var(--accent),#16a34a);border:none;color:#fff}
  .chip-badge{background:var(--bg);color:var(--txt);padding:1px 6px;border-radius:10px;font-size:12px;margin-left:5px}
  .link-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:8px}
  .link-row input{flex:1}
  .footer{text-align:center;padding:18px;color:var(--muted);font-size:12px}
  .hidden{display:none!important}
  .toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);color:var(--txt);padding:10px 16px;border-radius:12px;z-index:50;font-size:13px;opacity:0;transition:opacity .6s}
  .show{opacity:1}
  .login-form{display:flex;flex-direction:column;gap:8px}
  .login-form input{width:100%;max-width:260px;background:var(--surface);border:1px solid var(--border);color:var(--txt);padding:7px 10px;border-radius:8px;font-size:13px;flex:none}
  .login-actions{display:flex;gap:8px}
  .login-actions .btn{flex:1;font-size:14px;padding:8px}
  .error{color:var(--bad);font-size:13px;margin-top:4px}
</style>
</head>
<body>

<!-- LOGIN PANEL -->
<div class="app" id="login-panel" style="max-width:300px;margin:24px auto;text-align:center">
  <h1 style="margin-bottom:2px;font-size:22px">Done</h1>
  <div class="small" style="margin-bottom:16px">Shared shopping lists, synced across devices</div>
  <div class="card">
    <div class="login-form">
      <input type="email" id="login-email" placeholder="Email address" autocomplete="email">
      <input type="password" id="login-password" placeholder="Password (6+ chars)" autocomplete="current-password">
      <div class="error" id="login-error"></div>
      <div class="login-actions">
        <button class="btn btn-primary" id="btn-login">Sign In</button>
        <button class="btn btn-ghost" id="btn-signup">Create Account</button>
      </div>
    </div>
  </div>
</div>

<!-- MAIN APP (hidden until authenticated) -->
<div class="app hidden" id="main-panel">
  <header>
    <h1>Done <span class="small" id="user-email-display"></span></h1>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-ghost" id="btn-link" title="Link Partner">⚙</button>
      <button class="btn btn-ghost" id="btn-logout">Logout</button>
    </div>
  </header>

  <div class="card" id="link-panel" style="display:none">
    <div class="small">Your ID: <b id="uid-display">...</b> <button class="btn btn-ghost" id="btn-copy-uid" style="font-size:11px;padding:2px 6px">Copy</button></div>
    <div class="link-row">
      <input type="text" id="link-input" placeholder="Paste partner's email or UID">
      <button class="btn btn-primary" id="btn-link-action">Link</button>
    </div>
    <div class="link-row">
      <button class="btn btn-ghost" id="btn-unlink">Unlink</button>
    </div>
    <div id="linked-to" class="small" style="margin-top:6px"></div>
  </div>

  <div class="card">
    <div class="input">
      <input type="text" id="new-item" placeholder="Add item (e.g. Milk)">
      <input type="text" id="new-cat" placeholder="Category" style="max-width:140px">
      <button class="btn btn-primary" id="btn-add">Add</button>
    </div>
    <div class="chip-group" id="chip-group"></div>
  </div>

  <div class="card" id="list-card"></div>

  <div class="card" style="display:flex;gap:10px;align-items:center">
    <div class="small" style="flex:1">
      <b id="total-items">0</b> items, <b id="done-items">0</b> done
    </div>
    <button class="btn btn-ghost" id="btn-clear">Clear finished</button>
  </div>

  <div class="footer">Press Enter to add — click circle to toggle</div>
</div>

<div id="toast" class="toast"></div>

<script type="module" src="index.js"></script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js')
    .then(r=>console.log('SW registered',r.scope))
    .catch(e=>console.error('SW failed',e));
}
</script>
</body>
</html>
